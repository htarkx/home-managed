prometheus:
  prometheusSpec:
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 512Mi

grafana:
  envFromSecret: grafana-authentik-oauth
  grafana.ini:
    server:
      root_url: https://ob.htark.dev
    auth:
      disable_login_form: true
      oauth_auto_login: true
    auth.basic:
      enabled: false
    auth.anonymous:
      enabled: false
    auth.generic_oauth:
      enabled: true
      name: authentik
      allow_sign_up: true
      auto_login: true
      client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email
      auth_url: https://auth.htark.dev/application/o/authorize/
      token_url: https://auth.htark.dev/application/o/token/
      api_url: https://auth.htark.dev/application/o/userinfo/
      role_attribute_path: contains(groups[*], 'grafana-admins') && 'Admin' || 'Viewer'
      role_attribute_strict: true
  initChownData:
    enabled: false
  persistence:
    enabled: true
    storageClassName: local-path
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
  service:
    type: ClusterIP

alertmanager:
  enabled: true

defaultRules:
  create: true
  rules:
    cilium: true
