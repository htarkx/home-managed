kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 6443

bpf:
  masquerade: true
  hostLegacyRouting: false

ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - 10.42.0.0/16
    clusterPoolIPv4MaskSize: 24

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

policyEnforcementMode: default
enableIPv4Masquerade: true
routingMode: native
ipv4NativeRoutingCIDR: 10.42.0.0/16
tunnelProtocol: ""

ingressController:
  enabled: true
  loadbalancerMode: shared
  hostNetwork:
    enabled: true
    sharedListenerPort: 443

l7Proxy: true

resources:
  limits:
    memory: 1Gi
  requests:
    memory: 512Mi

operator:
  replicas: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
